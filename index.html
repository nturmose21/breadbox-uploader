<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BREADBOX Uploader</title>
    <meta name="description" content="Flash BREADBOX Arduino UNO projects from Chrome or Edge using Web Serial.">
    <meta property="og:title" content="BREADBOX Arduino UNO Uploader">
    <meta property="og:description" content="Pick a BREADBOX sketch and upload it straight to an Arduino UNO.">
    <meta name="theme-color" content="#10bdb8">
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="page-shell">
      <header class="site-header" aria-labelledby="app-title">
        <div class="brand-block">
          <h1 class="brand-logo" id="app-title">BREADBOX</h1>
          <p class="eyebrow">Arduino starter kit uploader</p>
        </div>
        <div class="status-row" aria-label="Uploader status">
          <div class="browser-pill" id="browser-status">Checking browser</div>
          <div class="count-pill" id="sketch-count">0 sketches</div>
        </div>
      </header>

      <section class="uploader-grid">
        <section class="panel project-panel" aria-label="Sketch list">
          <div class="panel-heading">
            <div>
              <p class="panel-kicker">Step 1</p>
              <h2>Pick a project</h2>
            </div>
            <button class="icon-button" id="refresh-button" type="button" aria-label="Refresh firmware list" title="Refresh firmware list">
              <span aria-hidden="true">↻</span>
            </button>
          </div>
          <div class="sketch-list" id="sketch-list"></div>
        </section>

        <section class="panel upload-panel" aria-label="Uploader">
          <div class="panel-heading upload-heading">
            <div>
              <p class="panel-kicker">Step 2</p>
              <h2>Upload</h2>
            </div>
            <label class="file-control">
              <span>Custom HEX</span>
              <input id="hex-file" type="file" accept=".hex,text/plain">
            </label>
          </div>

          <div class="selected">
            <p class="panel-kicker">Selected</p>
            <h3 id="selected-name">No sketch selected</h3>
            <p id="selected-detail">Choose a BREADBOX sketch.</p>
            <div class="selected-badges" aria-hidden="true">
              <span>UNO</span>
              <span>USB</span>
              <span>HEX</span>
            </div>
          </div>

          <button class="primary" id="upload-button" type="button" disabled>
            <span class="button-icon" aria-hidden="true">&gt;</span>
            <span id="upload-button-label">Upload to UNO</span>
          </button>

          <div class="progress-wrap" aria-label="Upload progress">
            <div class="progress-bar">
              <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="progress-meta">
              <span id="progress-label">Idle</span>
              <span id="progress-percent">0%</span>
            </div>
          </div>

          <div class="console-frame">
            <div class="console-tabs" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <pre class="log" id="log" aria-live="polite"></pre>
          </div>
        </section>
      </section>
    </main>
    <noscript>
      <div class="noscript">JavaScript is required for the BREADBOX uploader.</div>
    </noscript>

    <script type="module" src="app.js"></script>
  </body>
</html>
